name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore AuthMiddlware.sln
      - name: Build
        run: dotnet build AuthMiddlware.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test AuthMiddlware.Tests/AuthMiddlware.Tests.csproj --configuration Release --no-build --verbosity normal
